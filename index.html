<style id="pinprompt-dashboard-polish">
  .sticky-card{
    height:240px!important;
    min-height:240px!important;
    max-height:240px!important;
    overflow:hidden!important;
  }
  .sticky-card img{
    height:72px!important;
    object-fit:cover!important;
  }
  .pinprompt-dashboard-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:40px;
    margin-left:auto;
    min-height:40px;
    padding:0 8px 0 28px;
    font-size:14px;
    font-weight:800;
    color:#1f2937;
    white-space:nowrap;
    flex-shrink:0;
  }
  .pinprompt-dashboard-nav button{
    border:0;
    background:transparent;
    color:inherit;
    cursor:pointer;
    height:40px;
    padding:0;
    font:inherit;
    line-height:40px;
  }
  .pinprompt-dashboard-nav button:hover{color:#e91e63}
  .pinprompt-filter-row-moved{
    margin-left:auto!important;
    padding-bottom:0!important;
    align-items:center!important;
    flex-wrap:wrap!important;
    overflow-x:visible!important;
  }
  .pinprompt-card-summary-row{
    gap:16px!important;
    align-items:center!important;
  }
  .pinprompt-card-summary-row > span{flex-shrink:0!important}
  .pinprompt-home-link{cursor:pointer!important}
  @media (max-width: 1100px){
    .pinprompt-dashboard-nav{gap:22px;font-size:13px;padding-left:14px}
  }
  @media (max-width: 900px){
    .pinprompt-dashboard-nav{gap:18px;font-size:12px;overflow-x:auto}
    .pinprompt-filter-row-moved{width:100%;margin-left:0!important;margin-top:8px}
    .pinprompt-card-summary-row{flex-wrap:wrap!important}
  }
</style>
<script>
  (function(){
    var labels=["产品","模板","工作流","路线图","案例"];
    var targets={产品:"top",模板:"features-strip",工作流:"core-abilities",路线图:"core-abilities",案例:"features-strip"};
    function goHome(label){
      try{
        localStorage.removeItem("pinprompt_visited");
        if(label)sessionStorage.setItem("pinprompt_home_target",label);
      }catch(e){}
      location.reload();
    }
    function buildNav(){
      var nav=document.querySelector(".pinprompt-dashboard-nav")||document.createElement("nav");
      if(!nav.dataset.ready){
        nav.className="pinprompt-dashboard-nav";
        nav.setAttribute("aria-label","Homepage sections");
        labels.forEach(function(label){
          var button=document.createElement("button");
          button.type="button";
          button.textContent=label;
          button.addEventListener("click",function(){goHome(label)});
          nav.appendChild(button);
        });
        nav.dataset.ready="1";
      }
      return nav;
    }
    function findFilterRow(root){
      return Array.from(root.querySelectorAll("div")).find(function(node){
        return Array.from(node.children).some(function(child){
          return child.tagName==="BUTTON"&&/^全部/.test((child.textContent||"").trim());
        });
      });
    }
    function findSummaryRow(){
      var span=Array.from(document.querySelectorAll("main span")).find(function(node){
        return /全部卡片/.test(node.textContent||"");
      });
      return span&&span.parentElement;
    }
    function enhanceHeader(){
      var header=document.querySelector("main > header");
      if(!header)return;
      var title=header.querySelector("h2");
      if(!title)return;
      var titleRow=title.parentElement;
      if(titleRow){
        titleRow.style.marginBottom="0";
        titleRow.style.width="100%";
        titleRow.style.alignItems="center";
        var nav=buildNav();
        if(nav.parentElement!==titleRow)titleRow.appendChild(nav);
      }
      header.style.alignItems="center";
      header.style.minHeight="64px";
      header.style.padding="12px 24px";
      var filterRow=findFilterRow(header);
      var summaryRow=findSummaryRow();
      if(filterRow&&summaryRow){
        filterRow.classList.add("pinprompt-filter-row-moved");
        summaryRow.classList.add("pinprompt-card-summary-row");
        summaryRow.style.display="flex";
        summaryRow.style.justifyContent="space-between";
        if(filterRow.parentElement!==summaryRow)summaryRow.appendChild(filterRow);
      }
    }
    function enhanceLogo(){
      var logoText=Array.from(document.querySelectorAll("span")).find(function(node){
        return node.textContent==="提示词灵感库";
      });
      if(!logoText)return;
      var container=logoText.closest("div[style]")&&logoText.closest("div[style]").parentElement&&logoText.closest("div[style]").parentElement.parentElement;
      if(!container||container.dataset.pinpromptHomeLink)return;
      container.dataset.pinpromptHomeLink="1";
      container.classList.add("pinprompt-home-link");
      container.title="返回 Homepage";
      container.addEventListener("click",function(){goHome()});
    }
    function scrollHomeTarget(){
      var label;
      try{label=sessionStorage.getItem("pinprompt_home_target");}catch(e){}
      if(!label)return;
      try{sessionStorage.removeItem("pinprompt_home_target");}catch(e){}
      setTimeout(function(){
        var id=targets[label];
        if(id==="top"){window.scrollTo({top:0,behavior:"smooth"});return;}
        var target=document.getElementById(id);
        if(target)target.scrollIntoView({behavior:"smooth",block:"start"});
      },350);
    }
    function run(){
      enhanceHeader();
      enhanceLogo();
      scrollHomeTarget();
    }
    run();
    [80,300,900,1600].forEach(function(ms){setTimeout(run,ms)});
    document.addEventListener("click",function(){setTimeout(run,0);setTimeout(run,120)});
  })();
</script>
